<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34C759"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#AF52DE"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#007AFF"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF9500"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8E8E93"/>
    </marker>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      /* Secondary / inset backgrounds */
      rect[fill="#F2F2F7"], rect[fill="#f2f2f2"] { fill: #2C2C2E !important; }

      /* Tinted backgrounds → dark versions */
      rect[fill="#FFFBE6"] { fill: #3A3520 !important; }
      rect[fill="#FFF3E0"] { fill: #3A2E20 !important; }
      rect[fill="#E8F5E9"] { fill: #1A3020 !important; }
      rect[fill="#F3E5F5"], rect[fill="#F3E8FF"] { fill: #2A1A30 !important; }
      rect[fill="#E3F2FD"] { fill: #1A2530 !important; }

      /* Near-black text → light */
      [fill="#1C1C1E"] { fill: #F5F5F7 !important; }
      [fill="#333"], [fill="#333333"] { fill: #F5F5F7 !important; }
      [fill="#4a4a4a"] { fill: #E5E5E7 !important; }
      [fill="#3f3d56"] { fill: #E5E5E7 !important; }
      [fill="#3A3A3C"] { fill: #D1D1D6 !important; }
      [fill="#555"] { fill: #D1D1D6 !important; }
      [fill="#666"] { fill: #C7C7CC !important; }

      /* Medium gray text → brighter */
      [fill="#636366"] { fill: #AEAEB2 !important; }
      [fill="#8E8E93"] { fill: #A1A1A6 !important; }
      [fill="#888"] { fill: #AEAEB2 !important; }
      [fill="#999"] { fill: #AEAEB2 !important; }
      [fill="#a8a8a8"] { fill: #C7C7CC !important; }

      /* Gray shape fills */
      rect[fill="#E5E5EA"] { fill: #48484A !important; }
      rect[fill="#d8d8d8"] { fill: #48484A !important; }
      rect[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#d8d8d8"] { fill: #48484A !important; }

      /* Borders and strokes */
      [stroke="#E5E5EA"] { stroke: #38383A !important; }
      [stroke="#D1D1D6"] { stroke: #38383A !important; }
      [stroke="#C6C6C8"] { stroke: #38383A !important; }
      [stroke="#C7C7CC"] { stroke: #48484A !important; }
      [stroke="#F2F2F7"] { stroke: #2C2C2E !important; }

      /* Arrows and connectors */
      [stroke="#999"] { stroke: #636366 !important; }
      [stroke="#AAA"] { stroke: #636366 !important; }
      [stroke="#8E8E93"] { stroke: #58585A !important; }
      path[fill="#999"] { fill: #636366 !important; }

      /* Warning stroke */
      rect[stroke="#FFD60A"] { stroke: #B39700 !important; }
    }
  </style>

  <!-- Row 1: 可见 -->
  <rect x="30" y="30" width="90" height="44" rx="12" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="75" y="57" text-anchor="middle" fill="white" font-size="15" font-weight="600">可见</text>

  <line x1="120" y1="52" x2="168" y2="52" stroke="#34C759" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="180" y="48" fill="#1D1D1F" font-size="14" font-weight="500">理解行为</text>

  <line x1="244" y1="52" x2="292" y2="52" stroke="#34C759" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="304" y="30" width="160" height="44" rx="12" fill="none" stroke="#34C759" stroke-width="1.5"/>
  <text x="384" y="57" text-anchor="middle" fill="#34C759" font-size="14" font-weight="500">建立初步信任</text>

  <!-- Vertical connector 1 -->
  <line x1="75" y1="74" x2="75" y2="130" stroke="#8E8E93" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- Row 2: 可控 -->
  <rect x="30" y="140" width="90" height="44" rx="12" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="75" y="167" text-anchor="middle" fill="white" font-size="15" font-weight="600">可控</text>

  <line x1="120" y1="162" x2="168" y2="162" stroke="#AF52DE" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <text x="180" y="158" fill="#1D1D1F" font-size="14" font-weight="500">设定边界</text>

  <line x1="244" y1="162" x2="292" y2="162" stroke="#AF52DE" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <rect x="304" y="140" width="160" height="44" rx="12" fill="none" stroke="#AF52DE" stroke-width="1.5"/>
  <text x="384" y="167" text-anchor="middle" fill="#AF52DE" font-size="14" font-weight="500">信任进一步增强</text>

  <!-- Vertical connector 2 -->
  <line x1="75" y1="184" x2="75" y2="240" stroke="#8E8E93" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- Row 3: 可逆 -->
  <rect x="30" y="250" width="90" height="44" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="75" y="277" text-anchor="middle" fill="white" font-size="15" font-weight="600">可逆</text>

  <line x1="120" y1="272" x2="168" y2="272" stroke="#007AFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <text x="180" y="268" fill="#1D1D1F" font-size="14" font-weight="500">消除后顾之忧</text>

  <line x1="276" y1="272" x2="324" y2="272" stroke="#007AFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="336" y="250" width="130" height="44" rx="12" fill="none" stroke="#007AFF" stroke-width="1.5"/>
  <text x="401" y="277" text-anchor="middle" fill="#007AFF" font-size="14" font-weight="500">完全信任</text>

  <!-- Vertical connector 3 -->
  <line x1="75" y1="294" x2="75" y2="350" stroke="#8E8E93" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- Row 4: Result -->
  <rect x="30" y="360" width="540" height="52" rx="12" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="300" y="391" text-anchor="middle" fill="white" font-size="16" font-weight="600">敢于委派更多任务 → 获得更大价值</text>
</svg>