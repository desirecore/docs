  <text x="42" y="475" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">3</text>
  <rect x="56" y="463" width="40" height="16" rx="4" fill="#FFF3E0"/>
  <text x="76" y="474" text-anchor="middle" fill="#FF9500" font-size="9" font-weight="600">固化</text>
