  <text x="76" y="511" text-anchor="middle" fill="#AF52DE" font-size="9" font-weight="600">灵活</text>
  <text x="104" y="512" fill="#1C1C1E" font-size="11">分析进口设备条款</text>
  <text x="460" y="512" fill="#FF9500" font-size="11" font-weight="500" text-anchor="end">&#x26A0;&#xFE0F; 1.5min</text>
