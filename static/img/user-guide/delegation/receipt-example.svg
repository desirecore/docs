  <rect x="56" y="537" width="40" height="16" rx="4" fill="#F3E5F5"/>
  <text x="76" y="548" text-anchor="middle" fill="#AF52DE" font-size="9" font-weight="600">灵活</text>
  <text x="104" y="549" fill="#1C1C1E" font-size="11">综合风险评估</text>
  <text x="460" y="549" fill="#34C759" font-size="11" font-weight="500" text-anchor="end">&#x2705; 1.2min</text>

  <!-- Step 6 -->
  <circle cx="42" cy="571" r="7" fill="url(#greenGrad)"/>
  <text x="42" y="575" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">6</text>
  <rect x="56" y="563" width="52" height="16" rx="4" fill="#E3F2FD"/>
  <text x="82" y="574" text-anchor="middle" fill="#007AFF" font-size="9" font-weight="600">人闸门</text>
  <text x="116" y="575" fill="#1C1C1E" font-size="11">确认后保存报告</text>
  <text x="460" y="575" fill="#34C759" font-size="11" font-weight="500" text-anchor="end">&#x2705; 3.5s</text>
  <text x="68" y="590" fill="#8E8E93" font-size="10">└─ 用户确认：已批准</text>

  <!-- Divider -->
