  <text x="42" y="664" fill="#1C1C1E" font-size="11">· 违约金标准（≤20%）—— 来自 3 月 1 日教学</text>
  <text x="42" y="680" fill="#1C1C1E" font-size="11">· 付款周期标准（≥30 天）—— 来自 3 月 1 日教学</text>
