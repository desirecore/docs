<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 820" width="780" height="820">
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        fill: #FFFFFF;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .label {
        font-size: 13px;
        fill: #555555;
        font-weight: 600;
      }
      /* Secondary / inset backgrounds */
      rect[fill="#F2F2F7"], rect[fill="#f2f2f2"] { fill: #2C2C2E !important; }

      /* Tinted backgrounds → dark versions */
      rect[fill="#FFFBE6"] { fill: #3A3520 !important; }
      rect[fill="#FFF3E0"] { fill: #3A2E20 !important; }
      rect[fill="#E8F5E9"] { fill: #1A3020 !important; }
      rect[fill="#F3E5F5"], rect[fill="#F3E8FF"] { fill: #2A1A30 !important; }
      rect[fill="#E3F2FD"] { fill: #1A2530 !important; }

      /* Near-black text → light */
      [fill="#1C1C1E"] { fill: #F5F5F7 !important; }
      [fill="#333"], [fill="#333333"] { fill: #F5F5F7 !important; }
      [fill="#4a4a4a"] { fill: #E5E5E7 !important; }
      [fill="#3f3d56"] { fill: #E5E5E7 !important; }
      [fill="#3A3A3C"] { fill: #D1D1D6 !important; }
      [fill="#555"] { fill: #D1D1D6 !important; }
      [fill="#666"] { fill: #C7C7CC !important; }

      /* Medium gray text → brighter */
      [fill="#636366"] { fill: #AEAEB2 !important; }
      [fill="#8E8E93"] { fill: #A1A1A6 !important; }
      [fill="#888"] { fill: #AEAEB2 !important; }
      [fill="#999"] { fill: #AEAEB2 !important; }
      [fill="#a8a8a8"] { fill: #C7C7CC !important; }

      /* Gray shape fills */
      rect[fill="#E5E5EA"] { fill: #48484A !important; }
      rect[fill="#d8d8d8"] { fill: #48484A !important; }
      rect[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#d8d8d8"] { fill: #48484A !important; }

      /* Borders and strokes */
      [stroke="#E5E5EA"] { stroke: #38383A !important; }
      [stroke="#D1D1D6"] { stroke: #38383A !important; }
      [stroke="#C6C6C8"] { stroke: #38383A !important; }
      [stroke="#C7C7CC"] { stroke: #48484A !important; }
      [stroke="#F2F2F7"] { stroke: #2C2C2E !important; }

      /* Arrows and connectors */
      [stroke="#999"] { stroke: #636366 !important; }
      [stroke="#AAA"] { stroke: #636366 !important; }
      [stroke="#8E8E93"] { stroke: #58585A !important; }
      path[fill="#999"] { fill: #636366 !important; }

      /* Warning stroke */
      rect[stroke="#FFD60A"] { stroke: #B39700 !important; }
    }
  </style>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AAAAAA"/>
    </marker>
  </defs>

  <!--
    Layout (top-down, center column = x:390):

    Row 0 (y=40):   Start "你想做什么？"
    Row 1 (y=150):  A "传授知识/经验？"
    Row 2 (y=300):  B "有具体示例吗？" (left, x=200)   C "需要智能体做事？" (right, x=580)
    Row 3 (y=440):  Demo (x=100)  Teach (x=300)        Delegate (x=580)
    Row 4 (y=520):                                       D "想改进智能体？" (x=580)
    Row 5 (y=660):                                       E "基于已完成任务？" (x=460)   Chat (x=700)
    Row 6 (y=790):                                       Reflect (x=340)
  -->

  <!-- ===== ARROWS (drawn first, behind nodes) ===== -->

  <!-- Start → A -->
  <line x1="390" y1="66" x2="390" y2="98" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>

  <!-- A →是→ B -->
  <path d="M340,150 L200,250" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="188" class="label" font-size="13">是</text>

  <!-- A →不是→ C -->
  <path d="M440,150 L580,250" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="530" y="188" class="label" font-size="13">不是</text>

  <!-- B →有→ Demo -->
  <path d="M150,300 L100,390" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="110" y="340" class="label" font-size="13">有</text>

  <!-- B →没有→ Teach -->
  <path d="M250,300 L300,390" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="340" class="label" font-size="13">没有</text>

  <!-- C →是→ Delegate -->
  <line x1="580" y1="350" x2="580" y2="390" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="600" y="370" class="label" font-size="13">是</text>

  <!-- C →不是→ D (route via right side to avoid Delegate) -->
  <path d="M695,300 L730,300 L730,520 L695,520" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="750" y="415" class="label" font-size="13">不是</text>

  <!-- D →是→ E -->
  <path d="M530,520 L460,610" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="478" y="558" class="label" font-size="13">是</text>

  <!-- D →不是→ Chat -->
  <path d="M630,520 L700,610" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="685" y="558" class="label" font-size="13">不是</text>

  <!-- E →是→ Reflect -->
  <path d="M410,660 L340,740" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="358" y="695" class="label" font-size="13">是</text>

  <!-- E →不是→ Teach (long path going left and up) -->
  <path d="M410,660 L320,660 L320,445" fill="none" stroke="#AAA" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="6,3"/>
  <text x="358" y="648" class="label" font-size="13">不是</text>

  <!-- ===== NODES ===== -->

  <!-- Start: capsule (blue) -->
  <rect x="290" y="20" width="200" height="46" rx="23" fill="url(#blue)" filter="url(#sh)"/>
  <text x="390" y="43" font-size="16" font-weight="600">你想做什么？</text>

  <!-- A: diamond (orange) -->
  <g transform="translate(390,150)" filter="url(#sh)">
    <polygon points="0,-52 105,0 0,52 -105,0" fill="url(#orange)"/>
    <text x="0" y="0" font-size="14" font-weight="500">传授知识/经验？</text>
  </g>

  <!-- B: diamond (orange) -->
  <g transform="translate(200,300)" filter="url(#sh)">
    <polygon points="0,-52 105,0 0,52 -105,0" fill="url(#orange)"/>
    <text x="0" y="0" font-size="14" font-weight="500">有具体示例吗？</text>
  </g>

  <!-- C: diamond (orange) -->
  <g transform="translate(580,300)" filter="url(#sh)">
    <polygon points="0,-52 115,0 0,52 -115,0" fill="url(#orange)"/>
    <text x="0" y="0" font-size="14" font-weight="500">需要智能体做事？</text>
  </g>

  <!-- Demo: rounded rect (green) -->
  <rect x="30" y="395" width="140" height="46" rx="12" fill="url(#green)" filter="url(#sh)"/>
  <text x="100" y="418" font-size="15" font-weight="600">演：给示例</text>

  <!-- Teach: rounded rect (purple) -->
  <rect x="240" y="395" width="140" height="46" rx="12" fill="url(#purple)" filter="url(#sh)"/>
  <text x="310" y="418" font-size="15" font-weight="600">教：说规则</text>

  <!-- Delegate: rounded rect (green) -->
  <rect x="460" y="395" width="240" height="46" rx="12" fill="url(#green)" filter="url(#sh)"/>
  <text x="580" y="418" font-size="14" font-weight="600">让智能体立计划 → 做 → 复</text>

  <!-- D: diamond (orange) -->
  <g transform="translate(580,520)" filter="url(#sh)">
    <polygon points="0,-52 115,0 0,52 -115,0" fill="url(#orange)"/>
    <text x="0" y="0" font-size="14" font-weight="500">想改进智能体？</text>
  </g>

  <!-- E: diamond (orange) -->
  <g transform="translate(460,660)" filter="url(#sh)">
    <polygon points="0,-52 115,0 0,52 -115,0" fill="url(#orange)"/>
    <text x="0" y="0" font-size="14" font-weight="500">基于已完成任务？</text>
  </g>

  <!-- Chat: rounded rect (purple) -->
  <rect x="645" y="615" width="120" height="46" rx="12" fill="url(#purple)" filter="url(#sh)"/>
  <text x="705" y="638" font-size="15" font-weight="600">普通对话</text>

  <!-- Reflect: rounded rect (green) -->
  <rect x="260" y="745" width="170" height="46" rx="12" fill="url(#green)" filter="url(#sh)"/>
  <text x="345" y="768" font-size="15" font-weight="600">复：复盘改进</text>

</svg>