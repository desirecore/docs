<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 350" fill="none">
  <defs>
  <style>
      /* Secondary / inset backgrounds */
      rect[fill="#F2F2F7"], rect[fill="#f2f2f2"] { fill: #2C2C2E !important; }

      /* Tinted backgrounds → dark versions */
      rect[fill="#FFFBE6"] { fill: #3A3520 !important; }
      rect[fill="#FFF3E0"] { fill: #3A2E20 !important; }
      rect[fill="#E8F5E9"] { fill: #1A3020 !important; }
      rect[fill="#F3E5F5"], rect[fill="#F3E8FF"] { fill: #2A1A30 !important; }
      rect[fill="#E3F2FD"] { fill: #1A2530 !important; }

      /* Near-black text → light */
      [fill="#1C1C1E"] { fill: #F5F5F7 !important; }
      [fill="#333"], [fill="#333333"] { fill: #F5F5F7 !important; }
      [fill="#4a4a4a"] { fill: #E5E5E7 !important; }
      [fill="#3f3d56"] { fill: #E5E5E7 !important; }
      [fill="#3A3A3C"] { fill: #D1D1D6 !important; }
      [fill="#555"] { fill: #D1D1D6 !important; }
      [fill="#666"] { fill: #C7C7CC !important; }

      /* Medium gray text → brighter */
      [fill="#636366"] { fill: #AEAEB2 !important; }
      [fill="#8E8E93"] { fill: #A1A1A6 !important; }
      [fill="#888"] { fill: #AEAEB2 !important; }
      [fill="#999"] { fill: #AEAEB2 !important; }
      [fill="#a8a8a8"] { fill: #C7C7CC !important; }

      /* Gray shape fills */
      rect[fill="#E5E5EA"] { fill: #48484A !important; }
      rect[fill="#d8d8d8"] { fill: #48484A !important; }
      rect[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#C7C7CC"] { fill: #48484A !important; }
      circle[fill="#d8d8d8"] { fill: #48484A !important; }

      /* Borders and strokes */
      [stroke="#E5E5EA"] { stroke: #38383A !important; }
      [stroke="#D1D1D6"] { stroke: #38383A !important; }
      [stroke="#C6C6C8"] { stroke: #38383A !important; }
      [stroke="#C7C7CC"] { stroke: #48484A !important; }
      [stroke="#F2F2F7"] { stroke: #2C2C2E !important; }

      /* Arrows and connectors */
      [stroke="#999"] { stroke: #636366 !important; }
      [stroke="#AAA"] { stroke: #636366 !important; }
      [stroke="#8E8E93"] { stroke: #58585A !important; }
      path[fill="#999"] { fill: #636366 !important; }

      /* Warning stroke */
      rect[stroke="#FFD60A"] { stroke: #B39700 !important; }
    }
  </style>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="100%" stop-color="#FF6961"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="440" height="330" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E5EA" stroke-width="0.5"/>

  <!-- Header -->
  <rect x="10" y="10" width="440" height="48" rx="16" fill="url(#orangeGrad)"/>
  <rect x="10" y="42" width="440" height="16" fill="url(#orangeGrad)"/>
  <text x="30" y="41" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">📝 纠正了之前的理解</text>

  <!-- Original understanding -->
  <text x="30" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#8E8E93">原来的理解：</text>
  <rect x="30" y="94" width="400" height="36" rx="8" fill="#FFF3F0"/>
  <text x="40" y="117" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#FF3B30">"低于 30 天标准 → 高风险"</text>
  <!-- Strikethrough line -->
  <line x1="36" y1="114" x2="248" y2="114" stroke="#FF3B30" stroke-width="1" opacity="0.5"/>

  <!-- Divider with arrow -->
  <line x1="30" y1="148" x2="430" y2="148" stroke="#E5E5EA" stroke-width="0.5"/>
  <text x="230" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#FF9500" text-anchor="middle">↓</text>

  <!-- Corrected understanding -->
  <text x="30" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#1C1C1E">纠正后：</text>
  <rect x="30" y="188" width="400" height="58" rx="8" fill="#F0FFF4"/>
  <text x="40" y="208" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#34C759" font-weight="500">"偏离标准 ≤50% → 中风险（如 25 天 vs 30 天）</text>
  <text x="40" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#34C759" font-weight="500"> 偏离标准 &gt;50% → 高风险（如 10 天 vs 30 天）"</text>

  <!-- Orange correction tag -->
  <rect x="30" y="260" width="80" height="22" rx="6" fill="#FFF8EC"/>
  <text x="70" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#FF9500" text-anchor="middle" font-weight="500">已纠正</text>

  <!-- Buttons -->
  <rect x="30" y="296" width="120" height="34" rx="12" fill="url(#greenGrad)"/>
  <text x="90" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓ 正确</text>

  <rect x="170" y="296" width="120" height="34" rx="12" fill="url(#blueGrad)"/>
  <text x="230" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">✎ 修改</text>

  <rect x="310" y="296" width="120" height="34" rx="12" fill="url(#redGrad)"/>
  <text x="370" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">✗ 撤销</text>
</svg>
