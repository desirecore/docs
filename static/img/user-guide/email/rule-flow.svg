<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="rfBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="rfGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="rfOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="rfRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="100%" stop-color="#FF6961"/>
    </linearGradient>
    <filter id="rfShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="rfArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>

  <!-- 新邮件到达 -->
  <g filter="url(#rfShadow)">
    <rect x="170" y="16" width="180" height="44" rx="22" fill="url(#rfBlue)"/>
    <text x="260" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">新邮件到达</text>
  </g>

  <!-- 箭头 -->
  <line x1="260" y1="60" x2="260" y2="88" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>

  <!-- 逐条检查规则 -->
  <g filter="url(#rfShadow)">
    <rect x="155" y="90" width="210" height="44" rx="12" fill="#F2F2F7" stroke="#E5E5EA" stroke-width="1"/>
    <text x="260" y="117" text-anchor="middle" fill="#333" font-size="13" font-weight="500">逐条检查规则（按优先级）</text>
  </g>

  <!-- 箭头 -->
  <line x1="260" y1="134" x2="260" y2="162" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>

  <!-- 条件匹配？菱形 -->
  <g filter="url(#rfShadow)">
    <polygon points="260,164 360,210 260,256 160,210" fill="url(#rfOrange)" stroke="none"/>
    <text x="260" y="207" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">条件匹配？</text>
  </g>

  <!-- 否 → 检查下一条 -->
  <line x1="360" y1="210" x2="440" y2="210" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>
  <text x="395" y="200" text-anchor="middle" fill="#FF3B30" font-size="12" font-weight="500">否</text>
  <g filter="url(#rfShadow)">
    <rect x="442" y="190" width="60" height="40" rx="10" fill="#F2F2F7" stroke="#E5E5EA" stroke-width="1"/>
    <text x="472" y="207" text-anchor="middle" fill="#666" font-size="10">下一条</text>
    <text x="472" y="220" text-anchor="middle" fill="#666" font-size="10">规则</text>
  </g>
  <!-- 下一条规则回到检查 -->
  <path d="M 472 190 L 472 112 L 365 112" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#rfArrow)"/>

  <!-- 是 → 执行动作 -->
  <line x1="260" y1="256" x2="260" y2="284" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>
  <text x="275" y="274" fill="#34C759" font-size="12" font-weight="500">是</text>

  <g filter="url(#rfShadow)">
    <rect x="185" y="286" width="150" height="44" rx="12" fill="url(#rfGreen)"/>
    <text x="260" y="313" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">执行动作</text>
  </g>

  <!-- 箭头 -->
  <line x1="260" y1="330" x2="260" y2="358" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>

  <!-- stopOnMatch？菱形 -->
  <g filter="url(#rfShadow)">
    <polygon points="260,360 345,400 260,440 175,400" fill="url(#rfOrange)" stroke="none"/>
    <text x="260" y="397" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">stopOnMatch?</text>
  </g>

  <!-- 开启 → 停止 -->
  <line x1="260" y1="440" x2="260" y2="468" stroke="#999" stroke-width="1.5" marker-end="url(#rfArrow)"/>
  <text x="280" y="458" fill="#333" font-size="11">开启</text>

  <g filter="url(#rfShadow)">
    <rect x="195" y="470" width="130" height="40" rx="20" fill="url(#rfRed)"/>
    <text x="260" y="496" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">停止检查</text>
  </g>

  <!-- 关闭 → 回到检查下一条 -->
  <line x1="345" y1="400" x2="472" y2="400" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="392" fill="#333" font-size="11">关闭</text>
  <line x1="472" y1="400" x2="472" y2="230" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#rfArrow)"/>
</svg>
