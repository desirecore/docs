<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 账户管理首页 -->
  <g filter="url(#shadow)">
    <rect x="200" y="20" width="320" height="72" rx="16" fill="url(#gBlue)"/>
    <text x="360" y="48" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">账户管理首页</text>
    <text x="360" y="72" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">显示所有邮箱账户卡片</text>
  </g>

  <!-- 箭头：账户首页 → 单账户视图 -->
  <path d="M 300 92 L 300 130 L 180 130 L 180 170" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <rect x="145" y="118" width="120" height="22" rx="6" fill="#F2F2F7"/>
  <text x="205" y="133" text-anchor="middle" fill="#666" font-size="11">点击账户卡片</text>

  <!-- 箭头：账户首页 → 统一收件箱 -->
  <path d="M 420 92 L 420 130 L 540 130 L 540 170" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <rect x="395" y="108" width="160" height="36" rx="6" fill="#F2F2F7"/>
  <text x="475" y="123" text-anchor="middle" fill="#666" font-size="11">点击统一收件箱</text>
  <text x="475" y="138" text-anchor="middle" fill="#999" font-size="10">2 个账户时显示</text>

  <!-- 单账户邮件视图 -->
  <g filter="url(#shadow)">
    <rect x="40" y="170" width="280" height="72" rx="16" fill="url(#gGreen)"/>
    <text x="180" y="198" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">单账户邮件视图</text>
    <text x="180" y="222" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">两栏布局 · 消息/会话模式</text>
  </g>

  <!-- 统一收件箱视图 -->
  <g filter="url(#shadow)">
    <rect x="400" y="170" width="280" height="72" rx="16" fill="url(#gPurple)"/>
    <text x="540" y="198" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">统一收件箱视图</text>
    <text x="540" y="222" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">多账户聚合 · Provider 过滤</text>
  </g>

  <!-- 返回箭头：单账户 → 首页 -->
  <path d="M 100 170 Q 100 150, 100 130 Q 100 110, 200 100 L 200 92" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowLight)"/>
  <text x="88" y="118" text-anchor="middle" fill="#999" font-size="10">返回</text>

  <!-- 返回箭头：统一收件箱 → 首页 -->
  <path d="M 620 170 Q 620 150, 620 130 Q 620 110, 520 100 L 520 92" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrowLight)"/>
  <text x="632" y="118" text-anchor="middle" fill="#999" font-size="10">返回</text>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
</svg>
